<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="../global.css">
    <link rel="stylesheet" href="home.css">
    <link rel="shortcut icon" href="../assets/favicon/favicon.ico" type="image/x-icon">
    <title>SIGA | Home</title>
</head>
<body>
    <div class="header">
        <div class="content">
            <div class="dateTime">
                <span id="datetime">06:55</span>
                •
                <span id="weekday">Segunda-feira</span>
            </div>

            <div class="vDivider"></div>

            <img src="../assets/icons/notification.svg" alt="Notification bell">

            <div class="vDivider"></div>

            <div class="userInfo">
                <div class="info">
                    <span id="name">Pedro Bagriel</span>
                    <span id="additionalInfo">ADS • RA: 1310482411001</span>
                </div>
                <img src="../assets/images/userImage.png" alt="User image">
            </div>
        </div>
    </div>

    <div class="menu">
        <img src="../assets/logos/logoSiga color.svg" alt="logo Siga" class="logo">
        <div class="pages">
            <div class="top">
                <span class="page active">
                    <img src="../assets/icons/elements.svg" alt="Dashboard icon">
                    Dashboard
                </span>
                <a class="page inactive">
                    <img src="../assets/icons/book1.svg" alt="Classes icon">
                    Disciplinas
                </a>
            </div>
            <a class="page inactive">
                <img src="../assets/icons/configuration.svg" alt="Configuration icon">
                Configurações
            </a>
        </div>
        <div class="hDivider"></div>
        <div class="progress">
            CICLO ATUAL
            <span id="semester">
                1º Semestre
            </span>
            <div class="progressBar">
                <div id="bar"></div>
            </div>
        </div>
    </div>
</body>
</html>
